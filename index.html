<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>select</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/1164760?v=4">
    <style>
      :root {
        --bg: #0d0d0f;
        --fg: #e8e8ea;
        --muted: #8a8a92;
        --accent: #7fd1b9;
        --line: #1e1e22;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fafafa;
          --fg: #1a1a1c;
          --muted: #6a6a72;
          --accent: #2a8c70;
          --line: #e4e4e7;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 24px 96px;
      }
      header {
        text-align: center;
        margin-bottom: 56px;
      }
      header img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        display: block;
        margin: 0 auto 16px;
        object-fit: cover;
        border: 2px solid var(--line);
        padding: 3px;
        background: var(--bg);
      }
      header h1 {
        font-size: 28px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      header p {
        color: var(--muted);
        margin: 6px 0 0;
        font-size: 15px;
      }
      header a { color: var(--accent); text-decoration: none; }
      header a:hover { text-decoration: underline; }

      ul.repos { list-style: none; margin: 0; padding: 0; }
      ul.repos li { border-top: 1px solid var(--line); }
      ul.repos li:last-child { border-bottom: 1px solid var(--line); }
      a.repo {
        display: block;
        padding: 16px 4px;
        text-decoration: none;
        color: inherit;
      }
      a.repo:hover { background: var(--line); }
      .repo-top {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }
      .repo-name { font-weight: 600; color: var(--accent); }
      .repo-meta { color: var(--muted); font-size: 13px; }
      .repo-desc { color: var(--muted); margin: 4px 0 0; font-size: 14px; }
      .loading { color: var(--muted); text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a href="https://github.com/select"><img src="https://avatars.githubusercontent.com/u/1164760?v=4" alt="select"></a>
        <h1>I AM SELECT</h1>
      </header>
      <ul class="repos" id="repos"><li class="loading">loading repos…</li></ul>
    </div>

    <script>
      const list = document.getElementById('repos');
      const hidden = new Set(['matrix-bookmarks', 'Angular2-ES6-Babel-Browserify-Starter', 'soeren-music', 'FLISELab', 'pr0tv', 'select.github.io']);
      fetch('https://api.github.com/users/select/repos?per_page=100&sort=updated')
        .then(r => r.json())
        .then(repos => {
          repos = repos.filter(r => !r.fork && !hidden.has(r.name));
          repos.sort((a, b) => b.stargazers_count - a.stargazers_count);
          list.innerHTML = '';
          for (const r of repos) {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.className = 'repo';
            a.href = r.html_url;
            const meta = [];
            if (r.language) meta.push(r.language);
            if (r.stargazers_count) meta.push('★ ' + r.stargazers_count);
            a.innerHTML =
              '<div class="repo-top">' +
                '<span class="repo-name">' + r.name + '</span>' +
                (meta.length ? '<span class="repo-meta">' + meta.join(' · ') + '</span>' : '') +
              '</div>' +
              (r.description ? '<div class="repo-desc">' + r.description.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</div>' : '');
            li.appendChild(a);
            list.appendChild(li);
          }
        })
        .catch(() => { list.innerHTML = '<li class="loading">could not load repos</li>'; });
    </script>
  </body>
</html>
